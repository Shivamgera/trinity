# Azure OpenAI GPT-5 Configuration
# Deployment: gpt-5-chat on Azure OpenAI

llm:
  backend: "gpt5"
  model: "gpt-5-chat"
  temperature: 0.0
  max_tokens: 1024

  azure:
    endpoint: "https://sas-hackathon-sep.openai.azure.com/openai/deployments/gpt-5-chat/chat/completions"
    api_version: "2025-08-07"
    auth_type: "key"
    # API key can be set here or via AZURE_OPENAI_API_KEY env var
    # api_key: ""
