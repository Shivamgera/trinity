# W&B Hyperparameter Sweep Configuration for Executor PPO Agent
# Phase 3, Sweep v6: Expanded data (3,522 training days, 2010-2023).
# Architecture unlocked. 3-seed evaluation per trial. Reward variants.
# Gamma fixed at 0.97 (not swept — problem-dependent per supervisor).
#
# Training objective — maximize val/sharpe_ratio (mean across 3 seeds)

program: src/executor/sweep_train.py
method: bayes
metric:
  name: val/sharpe_ratio
  goal: maximize

run_cap: 80

parameters:
  # ---- Core hyperparameters ----

  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-3

  # Gamma FIXED — not a sweep parameter
  gamma:
    value: 0.97

  ent_coef:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 5.0e-2

  gae_lambda:
    distribution: uniform
    min: 0.90
    max: 0.99

  clip_range:
    values: [0.1, 0.2, 0.3]

  n_steps:
    values: [1024, 2048, 4096]

  batch_size:
    values: [64, 128, 256]

  # ---- Reward function (sweep parameter) ----
  reward_type:
    values: ["log_return", "sortino", "mean_variance", "cvar"]

  inaction_penalty:
    distribution: log_uniform_values
    min: 1.0e-6
    max: 5.0e-4

  norm_reward:
    values: [true, false]

  # ---- Architecture (unlocked) ----

  net_arch_width:
    values: [32, 48, 64, 128, 256]

  net_arch_depth:
    values: [2, 3]

  activation_fn:
    values: ["tanh", "relu"]

  # ---- Training budget ----

  total_timesteps:
    value: 100000

  patience:
    values: [8, 12, 15]

# Fixed hyperparameters (hardcoded in sweep_train.py):
#   n_epochs:         10
#   n_envs:           8
#   seeds:            [42, 123, 999] (3-seed mean evaluation)
#   transaction_cost: 0.001
#   slippage:         0.0005
