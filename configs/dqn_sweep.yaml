# W&B Hyperparameter Sweep Configuration for DQN Executor
# Bayesian optimization over DQN-specific hyperparameters.
# Architecture fixed at 2x64 Tanh to match PPO frozen (v4).
#
# Usage:
#     wandb sweep configs/dqn_sweep.yaml
#     wandb agent <sweep_id>

program: src/executor/sweep_train_dqn.py
command:
  - ${env}
  - python3
  - ${program}
  - ${args_no_hyphens}
method: bayes
metric:
  name: val/sharpe_ratio
  goal: maximize

# 50 runs: DQN has more hyperparameters to explore than PPO
run_cap: 50

parameters:
  # Learning rate: wider range than PPO since DQN dynamics differ
  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 1.0e-3

  # Discount factor
  gamma:
    distribution: uniform
    min: 0.90
    max: 0.99

  # Replay buffer size: too small = not enough diversity, too large = stale samples
  buffer_size:
    values: [10000, 25000, 50000]

  # Steps of random play before learning begins
  learning_starts:
    values: [500, 1000, 2000]

  # Fraction of training for epsilon decay (1.0 -> final_eps)
  exploration_fraction:
    distribution: uniform
    min: 0.05
    max: 0.20

  # Final epsilon after exploration decay
  exploration_final_eps:
    distribution: uniform
    min: 0.01
    max: 0.10

  # Steps between target network hard updates
  target_update_interval:
    values: [500, 1000, 2000]

  # Train every N env steps
  train_freq:
    values: [1, 4, 8]

  # Gradient steps per train trigger
  gradient_steps:
    values: [1, 4]

# Fixed hyperparameters (hardcoded in sweep_train_dqn.py):
#   total_timesteps:  250,000 (budget cap; early stopping fires sooner)
#   patience:         25 (eval periods without val improvement)
#   min_timesteps:    30,000 (grace period — no early stopping before this)
#   eval_freq:        2048 (steps between val evaluation)
#   batch_size:       64
#   tau:              1.0 (hard target updates)
#   net_arch:         [64, 64]
#   activation_fn:    Tanh
#   reward_type:      log_return
#   seed:             42
