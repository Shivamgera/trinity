# W&B Hyperparameter Sweep Configuration for DQN Executor
# Phase 2, Sweep v3: Expanded data (3,522 training days, 2010-2023).
# Architecture unlocked. 3-seed evaluation per trial. Reward variants.
# Gamma fixed at 0.97 (not swept — problem-dependent per supervisor).
#
# Usage:
#     wandb sweep configs/dqn_sweep.yaml
#     wandb agent <sweep_id>

program: src/executor/sweep_train_dqn.py
command:
  - ${env}
  - python3
  - ${program}
  - ${args_no_hyphens}
method: bayes
metric:
  name: val/sharpe_ratio
  goal: maximize

run_cap: 80

parameters:
  # ---- Core hyperparameters ----

  learning_rate:
    distribution: log_uniform_values
    min: 5.0e-5
    max: 2.0e-3

  # Gamma FIXED — not a sweep parameter
  gamma:
    value: 0.97

  buffer_size:
    values: [10000, 25000, 50000, 100000]

  learning_starts:
    values: [500, 1000, 2000, 5000]

  exploration_fraction:
    distribution: uniform
    min: 0.05
    max: 0.60

  exploration_final_eps:
    distribution: uniform
    min: 0.01
    max: 0.15

  target_update_interval:
    values: [500, 1000, 2000, 5000]

  train_freq:
    values: [1, 4, 8]

  gradient_steps:
    values: [1, 4]

  # ---- Reward function (sweep parameter) ----
  reward_type:
    values: ["log_return", "sortino", "mean_variance", "cvar"]

  # ---- Architecture (unlocked) ----

  net_arch_width:
    values: [32, 48, 64, 128, 256]

  net_arch_depth:
    values: [2, 3]

  activation_fn:
    values: ["tanh", "relu"]

  # ---- Training budget ----
  total_timesteps:
    value: 100000

  patience:
    values: [15, 25, 35]

# Fixed hyperparameters (hardcoded in sweep_train_dqn.py):
#   batch_size:       64
#   tau:              1.0 (hard target updates)
#   seeds:            [42, 123, 999] (3-seed mean evaluation)
#   eval_freq:        2048
#   min_timesteps:    10,000 (grace period, reduced for 100k budget)
