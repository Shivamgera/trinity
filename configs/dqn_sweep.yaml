# W&B Hyperparameter Sweep Configuration for DQN Executor
# Phase 2, Sweep v2: Expanded data (3,522 training days, 2010-2023).
# Architecture unlocked as sweep parameter.
#
# Usage:
#     wandb sweep configs/dqn_sweep.yaml
#     wandb agent <sweep_id>

program: src/executor/sweep_train_dqn.py
command:
  - ${env}
  - python3
  - ${program}
  - ${args_no_hyphens}
method: bayes
metric:
  name: val/sharpe_ratio
  goal: maximize

# 80 runs: larger sweep for expanded parameter space
run_cap: 80

parameters:
  # ---- Core hyperparameters ----

  # Learning rate: wider range
  learning_rate:
    distribution: log_uniform_values
    min: 5.0e-5
    max: 2.0e-3

  # Discount factor: wider for longer training data
  gamma:
    distribution: uniform
    min: 0.90
    max: 0.999

  # Replay buffer size
  buffer_size:
    values: [10000, 25000, 50000, 100000]

  # Steps of random play before learning begins
  learning_starts:
    values: [500, 1000, 2000, 5000]

  # Fraction of training for epsilon decay (1.0 -> final_eps)
  exploration_fraction:
    distribution: uniform
    min: 0.05
    max: 0.60

  # Final epsilon after exploration decay
  exploration_final_eps:
    distribution: uniform
    min: 0.01
    max: 0.15

  # Steps between target network hard updates
  target_update_interval:
    values: [500, 1000, 2000, 5000]

  # Train every N env steps
  train_freq:
    values: [1, 4, 8]

  # Gradient steps per train trigger
  gradient_steps:
    values: [1, 4]

  # ---- Architecture (unlocked) ----

  # Network width (all hidden layers same width)
  net_arch_width:
    values: [64, 128, 256]

  # Number of hidden layers
  net_arch_depth:
    values: [2, 3]

  # Activation function
  activation_fn:
    values: ["tanh", "relu"]

  # ---- Training budget ----
  total_timesteps:
    value: 500000

  patience:
    values: [15, 25, 35]

# Fixed hyperparameters (hardcoded in sweep_train_dqn.py):
#   batch_size:       64
#   tau:              1.0 (hard target updates)
#   reward_type:      log_return
#   seed:             42
#   eval_freq:        2048
#   min_timesteps:    30,000 (grace period)
