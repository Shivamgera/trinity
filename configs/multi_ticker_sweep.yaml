# Multi-ticker training sweep with frosty-sweep-27 base config.
# Trains on 5 tickers (AAPL, MSFT, GOOGL, SPY, AMZN) round-robin
# across 8 env slots. Val/test evaluation remains AAPL-only.
#
# The hypothesis: training on diverse market regimes prevents the
# buy-and-hold collapse seen in single-ticker AAPL training, where
# the agent learns that "always long" is optimal for a trending asset.
#
# Sweeps reward_type (sortino vs vol_scaled) and inaction_penalty.
# All other hyperparameters locked from frosty-sweep-27 (v7).

program: src/executor/sweep_train.py
method: bayes
metric:
  name: val/sharpe_ratio
  goal: maximize

run_cap: 15

parameters:
  # ---- Multi-ticker flag (ALWAYS ON for this sweep) ----
  multi_ticker:
    value: true

  # ---- Swept parameters ----
  reward_type:
    values: ["sortino", "vol_scaled"]

  inaction_penalty:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-2

  # ---- All locked from frosty-sweep-27 ----
  learning_rate:
    value: 2.299e-5
  gamma:
    value: 0.97
  ent_coef:
    value: 0.02970
  gae_lambda:
    value: 0.9467
  clip_range:
    value: 0.1
  n_steps:
    value: 2048
  batch_size:
    value: 128
  net_arch_width:
    value: 64
  net_arch_depth:
    value: 2
  activation_fn:
    value: "relu"
  norm_reward:
    value: false
  total_timesteps:
    value: 100000
  patience:
    value: 12

# Fixed hyperparameters (hardcoded in sweep_train.py):
#   n_epochs:         10
#   n_envs:           8 (round-robin: AAPL, MSFT, GOOGL, SPY, AMZN, AAPL, MSFT, GOOGL)
#   seeds:            [42, 123, 999] (3-seed mean evaluation)
#   transaction_cost: 0.001
#   slippage:         0.0005
#   inaction_threshold: 20 (default in env.py)
#   Val/test eval:    AAPL only
